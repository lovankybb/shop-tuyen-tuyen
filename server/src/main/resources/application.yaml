spring:
  application:
    name: tuyenshop
  #    connect to db
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      url: ${REDIS_URL}


  #      config jpa for postgres
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect


resend:
  api-key: ${RESEND_API_KEY}


server:
  port: 8080
  servlet:
    context-path: /api/v1/tuyenshop


#Json web token
jwt:
  secret-key: ${JWT_SECRETE_KEY}
  valid-duration: ${JWT_VALID_DURATION} #days
  refreshable:  ${JWT_REFRESHABLE} #days


app:
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_SECRET_KEY}
    cors:
      endpoint: ${FRONT_END_ADDRESS}





# payment handle params.
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  secret-key: ${VNPAY_SECRETE_KEY}
  pay-url: ${VNPAY_PAY_URL}
  return-url: ${VNPAY_RETURN_URL}
  expire-time: ${VNPAY_EXPIRE_TIME}

momo:
  partner-code: ${MOM0_PARTNER_CODE}
  access-key: ${MOMO_ACCESS_KEY}
  secret-key: ${MOMO_SECRET_KEY}
  redirect-url: ${MOMO_API_URL}
  api-url:  ${MOMO_API_URL}
  ipn-url: ${MOMO_NOTIFY_URL}
